<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gacha giảm giá Tarot cùng ythoo nhaa</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:120px;
background:linear-gradient(135deg,#ffc0e6,#ff8ac6);
overflow:hidden;
}

h1{
color:white;
font-size:40px;
}

input{
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
width:220px;
}

button{
padding:12px 25px;
font-size:18px;
cursor:pointer;
background:#ff2f92;
color:white;
border:none;
border-radius:10px;
margin-left:10px;
transition:0.2s;
}

button:hover{
background:#ff0f7a;
transform:scale(1.05);
}

#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,105,180,0.35);
}

.popup-box{
background:#ffe0f3;
padding:40px;
border-radius:20px;
width:340px;
position:absolute;
top:65%;
left:50%;
transform:translate(-50%,-50%) scale(0.7);
border:5px solid #ff2f92;
box-shadow:0 0 25px #ff69b4;
animation:pop 0.4s forwards;
}

@keyframes pop{
0%{transform:translate(-50%,-50%) scale(0.5);}
100%{transform:translate(-50%,-50%) scale(1);}
}

#message{
color:#ff2f92;
font-size:24px;
font-weight:bold;
}

/* trái tim bay */

.heart{
position:fixed;
font-size:24px;
animation:fly 2s linear forwards;
}

@keyframes fly{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-200px) scale(1.5);
opacity:0;
}
}

</style>

</head>

<body>

<h1> Gacha giảm giá Tarot cùng ythoo nhaa </h1>

<input id="bill" placeholder="Nhập mã bill">
<button onclick="gacha()">Quayyy</button>

<div id="popup">

<div class="popup-box">

<div id="message"></div>

<br>

<button onclick="closePopup()">Okiiii</button>

</div>

</div>

<script>

function gacha(){

let bill=document.getElementById("bill").value.trim();

if(bill===""){
alert("Nhập mã bill đi ng dpp của emm!");
return;
}

if(localStorage.getItem("bill_"+bill)){
alert("Mã bill này đã quay ròiiii!");
return;
}

let rand=Math.random()*100;
let prize;

if(rand<40){
prize=2;
}
else if(rand<75){
prize=5;
}
else if(rand<90){
prize=10;
}
else if(rand<97){
prize=15;
}
else{
prize=20;
}
localStorage.setItem("bill_"+bill,true);

document.getElementById("message").innerHTML=
"🎉 Chúc mừng ng dp với<br>mã bill <b>"+bill+"</b><br> đã trúng <b>"+prize+"%</b> giảm giá 💖Hãyyy chụp lại gửi ytho nhé";

document.getElementById("popup").style.display="block";

hearts();

}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* tạo trái tim */

function hearts(){

for(let i=0;i<15;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"%";
heart.style.top="80%";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},2000);

}

}

</script>

</body>
</html>
